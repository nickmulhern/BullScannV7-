<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BullScann 7</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:#0e1218; --surface:#161d28; --surface2:#1d2632; --line:#2a3543;
    --text:#e8edf4; --muted:#8593a6; --faint:#5b6779;
    --long:#34c98a; --short:#ec5a52; --flat:#e0a83e; --accent:#6ea8ff;
    --long-dim:rgba(52,201,138,.12); --short-dim:rgba(236,90,82,.12); --flat-dim:rgba(224,168,62,.12);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--ink); color:var(--text);
    font-family:'Inter',system-ui,sans-serif; font-size:15px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .mono { font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; }
  h1,h2,h3 { font-family:'Space Grotesk',sans-serif; letter-spacing:-.01em; }

  header.top {
    border-bottom:1px solid var(--line); padding:18px 24px;
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    background:linear-gradient(180deg,#121925,var(--ink));
  }
  .brand { font-family:'Space Grotesk'; font-weight:700; font-size:22px; letter-spacing:-.02em; }
  .brand span { color:var(--accent); }
  .brand small { display:block; font-family:'Inter'; font-weight:400; font-size:11px;
    color:var(--faint); letter-spacing:.08em; text-transform:uppercase; margin-top:2px; }
  .tabs { margin-left:auto; display:flex; gap:4px; }
  .tab { background:none; border:1px solid transparent; color:var(--muted);
    font-family:'Inter'; font-weight:500; font-size:14px; padding:7px 14px; border-radius:7px; cursor:pointer; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--text); background:var(--surface2); border-color:var(--line); }

  .wrap { max-width:1100px; margin:0 auto; padding:24px; }

  /* ---- controls ---- */
  .controls { background:var(--surface); border:1px solid var(--line); border-radius:12px;
    padding:18px; display:flex; gap:18px; align-items:flex-end; flex-wrap:wrap; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); font-weight:600; }
  .field select, .field input {
    background:var(--ink); border:1px solid var(--line); color:var(--text);
    font-family:'Inter'; font-size:14px; padding:9px 11px; border-radius:8px; min-width:140px;
  }
  .field input:focus, .field select:focus { outline:2px solid var(--accent); outline-offset:1px; }
  .run { margin-left:auto; }
  button.primary {
    background:var(--accent); color:#06121f; border:none; font-family:'Space Grotesk'; font-weight:700;
    font-size:15px; padding:11px 24px; border-radius:9px; cursor:pointer; transition:filter .15s;
  }
  button.primary:hover { filter:brightness(1.08); }
  button.primary:disabled { opacity:.55; cursor:default; }

  .meta { color:var(--muted); font-size:13px; margin:16px 2px; display:flex; gap:18px; flex-wrap:wrap; }
  .meta b { color:var(--text); font-weight:600; }

  /* ---- timeframe toggle ---- */
  .tf { display:inline-flex; background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:3px; margin:4px 0 18px; }
  .tf button { background:none; border:none; color:var(--muted); font-family:'Inter'; font-weight:600;
    font-size:13px; padding:8px 16px; border-radius:7px; cursor:pointer; }
  .tf button.on { background:var(--accent); color:#06121f; }

  /* ---- setup card ---- */
  .card { display:flex; background:var(--surface); border:1px solid var(--line); border-radius:11px;
    margin-bottom:10px; overflow:hidden; }
  .tile { width:96px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px; padding:14px 8px; border-right:1px solid var(--line); }
  .tile.long { background:var(--long-dim); } .tile.short { background:var(--short-dim); } .tile.flat { background:var(--flat-dim); }
  .grade { font-family:'Space Grotesk'; font-weight:700; font-size:32px; line-height:1; }
  .tile.long .grade { color:var(--long); } .tile.short .grade { color:var(--short); } .tile.flat .grade { color:var(--flat); }
  .score { font-family:'JetBrains Mono'; font-size:13px; color:var(--muted); }
  .dir { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
  .dir.long { color:var(--long); } .dir.short { color:var(--short); } .dir.flat { color:var(--flat); }

  .body { flex:1; padding:14px 18px; cursor:pointer; min-width:0; }
  .row1 { display:flex; align-items:baseline; gap:12px; }
  .sym { font-family:'Space Grotesk'; font-weight:700; font-size:20px; }
  .px { font-family:'JetBrains Mono'; font-size:15px; color:var(--muted); }
  .verdict { color:var(--muted); font-size:13px; margin-top:5px; }
  .verdict .pill { display:inline-block; font-size:11px; padding:1px 7px; border-radius:5px; margin-right:6px; font-weight:600; }
  .pill.up { background:var(--long-dim); color:var(--long); }
  .pill.down { background:var(--short-dim); color:var(--short); }
  .pill.warn { background:var(--flat-dim); color:var(--flat); }
  .chev { color:var(--faint); font-size:13px; user-select:none; }

  /* ---- expanded detail ---- */
  .detail { border-top:1px solid var(--line); padding:16px 18px; display:none; background:var(--ink); }
  .detail.open { display:block; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px 22px; }
  .stat { display:flex; flex-direction:column; gap:3px; }
  .stat .k { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint); }
  .stat .v { font-family:'JetBrains Mono'; font-size:14px; }
  .levels { margin-top:16px; }
  .levels h4 { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:8px; }
  .lvlrow { display:flex; gap:10px; flex-wrap:wrap; }
  .lvl { font-family:'JetBrains Mono'; font-size:13px; background:var(--surface2); border:1px solid var(--line);
    padding:5px 10px; border-radius:7px; }
  .lvl.res { border-color:rgba(236,90,82,.35); }
  .lvl.sup { border-color:rgba(52,201,138,.35); }
  .lvl b { color:var(--muted); font-weight:400; font-size:11px; margin-left:4px; }
  .risk { margin-top:14px; font-size:13px; }
  .risk .flag { color:var(--short); }
  .risk .ok { color:var(--long); }
  .copyrow { margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; }
  button.ghost { background:var(--surface2); border:1px solid var(--line); color:var(--text);
    font-family:'Inter'; font-weight:500; font-size:13px; padding:8px 14px; border-radius:8px; cursor:pointer; }
  button.ghost:hover { border-color:var(--accent); color:var(--accent); }
  .opts-note { margin-top:12px; font-size:12px; color:var(--faint); font-style:italic; }

  /* ---- states ---- */
  .state { text-align:center; padding:70px 20px; color:var(--muted); }
  .state h2 { color:var(--text); font-size:20px; margin-bottom:8px; }
  .spinner { width:34px; height:34px; border:3px solid var(--line); border-top-color:var(--accent);
    border-radius:50%; margin:0 auto 18px; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .errbox { background:var(--short-dim); border:1px solid rgba(236,90,82,.4); color:var(--text);
    padding:16px; border-radius:10px; }
  .errbox b { color:var(--short); }
  .muted-card { opacity:.5; }

  /* ---- prompts panel ---- */
  .prompts { display:none; }
  .prompts.show { display:block; }
  .results.hide { display:none; }
  .pblock { background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:16px; margin-bottom:14px; }
  .pblock h3 { font-size:15px; margin-bottom:4px; }
  .pblock p { color:var(--muted); font-size:12px; margin-bottom:10px; }
  .pblock textarea { width:100%; min-height:130px; background:var(--ink); border:1px solid var(--line);
    color:var(--text); font-family:'JetBrains Mono'; font-size:12px; padding:11px; border-radius:8px; resize:vertical; }
  .pblock .actions { margin-top:10px; display:flex; gap:10px; }
  .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--surface2);
    border:1px solid var(--accent); color:var(--text); padding:11px 20px; border-radius:9px; font-size:14px;
    opacity:0; pointer-events:none; transition:opacity .2s; z-index:50; }
  .toast.show { opacity:1; }

  @media (max-width:560px){ .tile{width:74px} .controls{flex-direction:column;align-items:stretch} .run{margin-left:0} }
  @media (prefers-reduced-motion:reduce){ .spinner{animation:none} * { transition:none!important } }
</style>
</head>
<body>
<header class="top">
  <div class="brand">Bull<span>Scann</span> 7<small>Tastytrade-fed setup scanner</small></div>
  <div class="tabs">
    <button class="tab active" data-view="scan">Scan</button>
    <button class="tab" data-view="prompts">Prompts</button>
  </div>
</header>

<div class="wrap">
  <!-- SCAN VIEW -->
  <div class="results" id="resultsView">
    <div class="controls">
      <div class="field">
        <label for="regime">Market regime (from Firewall)</label>
        <select id="regime">
          <option value="neutral">Neutral</option>
          <option value="bullish">Bullish</option>
          <option value="bearish">Bearish</option>
        </select>
      </div>
      <div class="field">
        <label for="news">News state</label>
        <select id="news">
          <option value="clean">Clean</option>
          <option value="caution">Caution</option>
          <option value="flag">Flag</option>
        </select>
      </div>
      <div class="field">
        <label for="exclude">Exclude (flagged, comma-sep)</label>
        <input id="exclude" placeholder="e.g. MU, AAPL" />
      </div>
      <div class="run"><button class="primary" id="runBtn">Run scan</button></div>
    </div>

    <div class="meta" id="meta" hidden></div>

    <div id="tfWrap" hidden>
      <div class="tf">
        <button class="on" data-tf="daily">Swing Long · Daily</button>
        <button data-tf="fiveMin">Swing Short · 5-min</button>
      </div>
    </div>

    <div id="output">
      <div class="state">
        <h2>Ready to scan</h2>
        <p>Set the regime and news from your Firewall run, then hit Run scan. Live Tastytrade data, scored and ranked.</p>
      </div>
    </div>
  </div>

  <!-- PROMPTS VIEW -->
  <div class="prompts" id="promptsView">
    <div class="meta"><span>Your prompt system. Paste each prompt once — it saves in this browser. Use Copy to grab it for a fresh scan session.</span></div>
    <div id="promptBlocks"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const FN = "/.netlify/functions/scan";
let currentTF = "daily";
let lastData = null;

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const fmt = n => (n==null||Number.isNaN(n)) ? "—" : n;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }
function store(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function load(k,d){ try{ return localStorage.getItem(k) ?? d; }catch(e){ return d; } }

/* ---------- view switching ---------- */
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  const v=t.dataset.view;
  $("#resultsView").classList.toggle("hide", v!=="scan");
  $("#promptsView").classList.toggle("show", v==="prompts");
}));

/* ---------- timeframe ---------- */
document.querySelectorAll(".tf button").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".tf button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); currentTF=b.dataset.tf; render();
}));

/* ---------- restore last settings ---------- */
$("#regime").value = load("bs_regime","neutral");
$("#news").value = load("bs_news","clean");
$("#exclude").value = load("bs_exclude","");

/* ---------- run scan ---------- */
$("#runBtn").addEventListener("click", runScan);
async function runScan(){
  const regime=$("#regime").value, news=$("#news").value, exclude=$("#exclude").value.trim();
  store("bs_regime",regime); store("bs_news",news); store("bs_exclude",exclude);
  const btn=$("#runBtn"); btn.disabled=true; btn.textContent="Scanning…";
  $("#output").innerHTML = `<div class="state"><div class="spinner"></div><h2>Scanning the universe</h2><p>Pulling live candles from Tastytrade and scoring. This takes a few seconds.</p></div>`;
  $("#meta").hidden=true; $("#tfWrap").hidden=true;

  const params=new URLSearchParams({regime,news});
  if(exclude) params.set("exclude",exclude);
  try{
    const res=await fetch(`${FN}?${params}`);
    if(!res.ok){ throw new Error(`Server returned ${res.status}. ${await res.text().catch(()=> "")}`); }
    const data=await res.json();
    if(data.error){ throw new Error(data.error); }
    lastData=data; renderMeta(data); $("#tfWrap").hidden=false; render();
  }catch(err){
    $("#output").innerHTML = `<div class="errbox"><b>Scan didn't complete.</b><br>${escapeHtml(String(err.message||err))}<br><br>If this is a credentials or streaming error, check the function logs in Netlify. If you're viewing this outside your deployed site, the scan endpoint isn't reachable here.</div>`;
  }finally{ btn.disabled=false; btn.textContent="Run scan"; }
}

function renderMeta(d){
  const m=$("#meta"); m.hidden=false;
  const t=new Date(d.asOf).toLocaleString();
  m.innerHTML = `<span>As of <b>${t}</b></span><span>Regime <b>${d.regimeBias}</b></span><span>News <b>${d.news}</b></span><span>Universe <b>${d.universe.length}</b></span>${d.excluded.length?`<span>Excluded <b>${d.excluded.join(", ")}</b></span>`:""}`;
}

/* ---------- render setups ---------- */
function render(){
  if(!lastData) return;
  const rows=Object.entries(lastData.results).map(([sym,r])=>{
    const s=r[currentTF];
    return { sym, struct:(s&&!s.error)?s:null, err:(s&&s.error)?s.error:null,
             copy:currentTF==="daily"?r.copyDaily:r.copyFiveMin };
  });
  // rank: tradeable by score desc, then no-trade, then errors
  const rank=x=>{ if(x.err) return -1000; const d=x.struct?.setup?.direction; if(d==="none") return -100; return x.struct?.setup?.score ?? -50; };
  rows.sort((a,b)=>rank(b)-rank(a));

  const out=$("#output"); out.innerHTML="";
  rows.forEach(row=>out.appendChild(card(row)));
}

function dirClass(dir){ return dir==="long"?"long":dir==="short"?"short":"flat"; }

function card(row){
  const el=document.createElement("div"); el.className="card";
  if(row.err){
    el.classList.add("muted-card");
    el.innerHTML=`<div class="tile flat"><div class="grade">·</div><div class="dir flat">n/a</div></div>
      <div class="body"><div class="row1"><span class="sym">${row.sym}</span></div>
      <div class="verdict">Insufficient data — ${escapeHtml(row.err)}</div></div>`;
    return el;
  }
  const s=row.struct, set=s.setup;
  const dir=set.direction, dc=dirClass(dir);
  const gradeTxt = dir==="none" ? "—" : set.grade;
  const dirTxt = dir==="none" ? "no-trade" : dir;
  const scoreTxt = dir==="none" ? "" : `${set.score}/100`;

  el.innerHTML=`
    <div class="tile ${dc}">
      <div class="grade">${gradeTxt}</div>
      <div class="score">${scoreTxt}</div>
      <div class="dir ${dc}">${dirTxt}</div>
    </div>
    <div class="body">
      <div class="row1"><span class="sym">${row.sym}</span><span class="px mono">$${fmt(s.price)}</span><span class="chev" style="margin-left:auto">▸ details</span></div>
      <div class="verdict">${verdictLine(s)}</div>
    </div>`;
  const detail=document.createElement("div"); detail.className="detail";
  detail.innerHTML=detailHtml(s);
  el.appendChild(detail);

  const bodyEl=el.querySelector(".body"); const chev=el.querySelector(".chev");
  bodyEl.addEventListener("click",()=>{ const open=detail.classList.toggle("open"); chev.textContent=open?"▾ details":"▸ details"; });
  // copy buttons
  detail.querySelectorAll("[data-copy]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation(); navigator.clipboard.writeText(row.copy||"").then(()=>toast(`Copied ${row.sym} block`));
  }));
  return el;
}

function verdictLine(s){
  const m=s.verdict.momentum, rev=s.verdict.reversal;
  const pill = m.startsWith("BULLISH")?'<span class="pill up">long bias</span>':m.startsWith("BEARISH")?'<span class="pill down">short bias</span>':'<span class="pill warn">no thesis</span>';
  const revTxt = rev==="no reversal signal" ? "" : `<span class="pill warn">reversal watch</span>`;
  return `${pill}${revTxt} ${escapeHtml(s.structure)} · RSI ${fmt(s.rsi)} · ${s.ema.stack}`;
}

function detailHtml(s){
  const set=s.setup, lv=s.horizontalLevels;
  const zones=(lv.allZones||[]).map(z=>{
    const cls = z.level>s.price ? "res" : "sup";
    return `<span class="lvl ${cls}">${z.level}<b>${z.touches}×</b></span>`;
  }).join("");
  const sup=lv.nearestSupport?`${lv.nearestSupport.level} (${lv.nearestSupport.touches}×)`:"none below";
  const res=lv.nearestResistance?`${lv.nearestResistance.level} (${lv.nearestResistance.touches}×)`:"none above";

  const riskFlags=(set.risk?.opposingFlags||[]);
  const riskHtml = riskFlags.length
    ? `<span class="flag">⚠ ${riskFlags.join(" · ")}</span>`
    : `<span class="ok">✓ no opposing signals</span>`;

  const bk=set.buckets;
  const bucketHtml = bk ? `Trend ${bk.trend} · Momentum ${bk.momentum} · Volume ${bk.volume} · Level ${bk.level} · Regime ${bk.regime}${bk.reversalPenalty?` · RevPen ${bk.reversalPenalty}`:""}${bk.newsPenalty?` · NewsPen ${bk.newsPenalty}`:""}` : "—";

  return `
    <div class="grid">
      <div class="stat"><span class="k">Price</span><span class="v">$${fmt(s.price)}</span></div>
      <div class="stat"><span class="k">EMA 10 / 20</span><span class="v">${fmt(s.ema.fast)} / ${fmt(s.ema.slow)}</span></div>
      <div class="stat"><span class="k">EMA stack</span><span class="v">${s.ema.stack}</span></div>
      <div class="stat"><span class="k">RSI</span><span class="v">${fmt(s.rsi)}</span></div>
      <div class="stat"><span class="k">MACD hist</span><span class="v">${fmt(s.macdHist.value)} ${s.macdHist.state}</span></div>
      <div class="stat"><span class="k">ATR</span><span class="v">${fmt(s.atr)}</span></div>
      <div class="stat"><span class="k">Dist from 20EMA</span><span class="v">${fmt(s.distanceFromEMA20_inATR)} ATR${s.stretched?" ⚠":""}</span></div>
      <div class="stat"><span class="k">Structure</span><span class="v">${s.structure}</span></div>
      <div class="stat"><span class="k">Rel volume</span><span class="v">${fmt(s.volume.relVol)}× ${s.volume.climax?"climax":""}</span></div>
    </div>
    <div class="levels">
      <h4>Key levels — nearest support ${sup} · nearest resistance ${res}</h4>
      <div class="lvlrow">${zones||'<span class="lvl">no clustered zones in lookback</span>'}</div>
    </div>
    <div class="risk">Risk profile: ${riskHtml}</div>
    <div class="risk" style="color:var(--muted)">Score buckets: ${bucketHtml}</div>
    <div class="opts-note">Options bucket: not connected — ranking on technicals (normalizedCore). Wire the options chain to activate IV/liquidity scoring.</div>
    <div class="copyrow">
      <button class="ghost" data-copy>Copy ${currentTF==="daily"?"Swing-Long":"Swing-Short"} block</button>
    </div>`;
}

function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---------- prompts panel ---------- */
const PROMPTS=[
  {key:"firewall", title:"Firewall / Fetch (Prompt A)", desc:"Run this in Claude with web search to get regime, news, and flagged tickers. Enter those into the scan controls."},
  {key:"swingshort", title:"Swing Short (Prompt B)", desc:"For 3–7 DTE setups. Paste the 5-min copy blocks into this."},
  {key:"swinglong", title:"Swing Long (Prompt C)", desc:"For 21–35 DTE swings. Paste the daily copy blocks into this."},
  {key:"guide", title:"User Guide", desc:"Your reference notes for running the system."},
];
function buildPrompts(){
  const c=$("#promptBlocks"); c.innerHTML="";
  PROMPTS.forEach(p=>{
    const div=document.createElement("div"); div.className="pblock";
    div.innerHTML=`<h3>${p.title}</h3><p>${p.desc}</p>
      <textarea id="pt_${p.key}" placeholder="Paste your ${p.title} text here…">${escapeHtml(load("bs_prompt_"+p.key,""))}</textarea>
      <div class="actions"><button class="ghost" data-save="${p.key}">Save</button><button class="ghost" data-copyp="${p.key}">Copy</button></div>`;
    c.appendChild(div);
  });
  c.querySelectorAll("[data-save]").forEach(b=>b.addEventListener("click",()=>{
    store("bs_prompt_"+b.dataset.save, $("#pt_"+b.dataset.save).value); toast("Saved");
  }));
  c.querySelectorAll("[data-copyp]").forEach(b=>b.addEventListener("click",()=>{
    navigator.clipboard.writeText($("#pt_"+b.dataset.copyp).value).then(()=>toast("Copied"));
  }));
}
buildPrompts();
</script>
</body>
</html>
